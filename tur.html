<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="favicon.png">
    <title>Kitap Türü Seçimi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📖 Kitap Türü Seçimi</h1>

    <p id="ageInfo" class="intro"></p>

    <div class="ai-box">
        <h2>🧠 AI Analizi</h2>
        <p id="aiText">
            Yapay zekâ, yaş grubuna uygun kitap türlerini analiz ediyor...
        </p>
    </div>

    <h2>📚 Kitap Türünü Seç</h2>

    <div class="genre-grid">
        <div class="card" onclick="selectGenre('Macera')">🏕️ Macera</div>
        <div class="card" onclick="selectGenre('Hikaye-Öykü')">📘 Hikâye / Öykü</div>
        <div class="card" onclick="selectGenre('Roman')">📕 Roman</div>
        <div class="card" onclick="selectGenre('Masal-Efsane')">🧚 Masal / Efsane</div>
        <div class="card" onclick="selectGenre('Destan')">🛡️ Destan</div>
        <div class="card" onclick="selectGenre('Gezi')">🌍 Gezi Yazıları</div>
        <div class="card" onclick="selectGenre('Bilim Kurgu')">🚀 Bilim Kurgu</div>
    </div>

    <p id="selectedGenre" class="selected"></p>

    <button id="continueBtn" onclick="goBooks()" disabled>
        ➡️ Kitapları Göster
    </button>
</div>
<button class="theme-btn" onclick="toggleDark()">
  🌙 
</button>
         <style>
             /* 🌙 Dark Mode Base */
body.dark{
  background:#0f172a;
  color:#e5e7eb;
}

body.dark .container{
  background:#020617;
}

body.dark .book-card{
  background:#020617;
  color:#e5e7eb;
  box-shadow:0 0 15px rgba(255,255,255,.05);
}

body.dark .ai-box,
body.dark .ai-note{
  background:#020617;
  color:#e5e7eb;
  border-left-color:#38bdf8;
}

body.dark h1,
body.dark h2{
  color:#f8fafc;
}

/* 🌗 Toggle Button */
.theme-btn{
  position:fixed;
  top:20px;
  right:20px;
  background:linear-gradient(135deg,#111827,#334155);
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:30px;
  cursor:pointer;
  font-size:14px;
  box-shadow:0 5px 15px rgba(0,0,0,.4);
  transition:.3s;
}

.theme-btn:hover{
  transform:scale(1.05);
}
nav {
  display: flex;
  flex-wrap: wrap;
}
img {
  max-width: 100%;
  height: auto;
}
button {
  padding: 12px 20px;
  font-size: 1rem;
  min-height: 44px; /* Finger friendly */
}
/* Phone */
@media (max-width: 600px) {
  body {
    font-size: 14px;
  }
}

/* Tablet */
@media (min-width: 601px) and (max-width: 1024px) {
  body {
    font-size: 16px;
  }
}

/* Computer */
@media (min-width: 1025px) {
  body {
    font-size: 18px;
  }
}
.card {
  max-width: 800px;
  width: 100%;
}

         </style>
<script>
    const ageGroup = localStorage.getItem("ageGroup");
    document.getElementById("ageInfo").innerText =
        "Seçilen yaş grubu: " + ageGroup;

    function selectGenre(genre) {
        localStorage.setItem("genre", genre);
        document.getElementById("selectedGenre").innerText =
            "Seçilen kitap türü: " + genre;

        document.getElementById("continueBtn").disabled = false;

        // AI simülasyonu metni
        document.getElementById("aiText").innerText =
            ageGroup + " yaş grubuna uygun " + genre +
            " türündeki kitaplar analiz edildi ve öneriler hazırlandı.";
    }

    function goBooks() {
        window.location.href = "kitaplar.html";
    }

function toggleDark(){
  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){
    localStorage.setItem("theme","dark");
  }else{
    localStorage.setItem("theme","light");
  }
}

/* Remember theme */
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
}
element.addEventListener("click", () => {});


</script>

</body>
</html>
