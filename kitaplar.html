<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<script src="data.js"></script>
<title>Kitap Önerileri</title>
<link rel="stylesheet" href="style.css">
<style>
.book-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; }
.book-card { background:#fff; padding:15px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,.1); cursor:pointer; }
.book-card img { width:100%; height:250px; object-fit:cover; border-radius:8px; }
.book-title { font-weight:bold; margin-top:10px; }
.book-detail { display:none; margin-top:10px; font-size:14px; }
.ai-note { background:#eef6ff; padding:8px; margin-top:8px; border-left:4px solid #3b82f6; }

.back-btn{
  background: linear-gradient(135deg,#3b82f6,#06b6d4);
  color:#fff;
  border:none;
  padding:14px 30px;
  font-size:18px;
  border-radius:30px;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
  transition:.3s;
}

.back-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 25px rgba(0,0,0,.3);
}
/* 🌙 Dark Mode Base */
body.dark{
  background:#0f172a;
  color:#e5e7eb;
}

body.dark .container{
  background:#020617;
}

body.dark .book-card{
  background:#020617;
  color:#e5e7eb;
  box-shadow:0 0 15px rgba(255,255,255,.05);
}

body.dark .ai-box,
body.dark .ai-note{
  background:#020617;
  color:#e5e7eb;
  border-left-color:#38bdf8;
}

body.dark h1,
body.dark h2{
  color:#f8fafc;
}

/* 🌗 Toggle Button */
.theme-btn{
  position:fixed;
  top:20px;
  right:20px;
  background:linear-gradient(135deg,#111827,#334155);
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:30px;
  cursor:pointer;
  font-size:14px;
  box-shadow:0 5px 15px rgba(0,0,0,.4);
  transition:.3s;
}

.theme-btn:hover{
  transform:scale(1.05);
}

/* 🌌 Premium Popup */
.notify{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.4s;
  z-index:999;
}

.notify.show{
  opacity:1;
  pointer-events:auto;
}

.notify-box{
  background:rgba(255,255,255,.95);
  width:90%;
  max-width:450px;
  border-radius:20px;
  padding:25px;
  animation:zoom .45s cubic-bezier(.4,0,.2,1);
  box-shadow:0 25px 50px rgba(0,0,0,.35);
  position:relative;
}

.notify-header{
  display:flex;
  gap:15px;
  align-items:center;
}

.notify-header img{
  width:80px;
  height:110px;
  object-fit:cover;
  border-radius:10px;
  box-shadow:0 10px 20px rgba(0,0,0,.25);
}

.notify-box h3{
  margin:0;
  font-size:22px;
}

.author{
  font-size:14px;
  opacity:.7;
}

.desc{
  margin:18px 0;
  line-height:1.6;
}

.notify-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.tag{
  background:#dbeafe;
  color:#1d4ed8;
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
}

.read-btn{
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  border:none;
  color:#fff;
  padding:10px 20px;
  border-radius:25px;
  cursor:pointer;
  font-size:14px;
  transition:.3s;
}

.read-btn:hover{
  transform:scale(1.05);
}

.close{
  position:absolute;
  top:15px;
  right:18px;
  cursor:pointer;
  font-size:18px;
  opacity:.6;
}

.close:hover{opacity:1}

/* 🌙 Dark Mode */
body.dark .notify-box{
  background:rgba(2,6,23,.95);
  color:#e5e7eb;
}

body.dark .tag{
  background:#1e293b;
  color:#38bdf8;
}

@keyframes zoom{
  from{transform:scale(.85) translateY(20px);opacity:0}
  to{transform:scale(1) translateY(0);opacity:1}
}
.card {
  max-width: 800px;
  width: 100%;
}
/* Phone */
@media (max-width: 600px) {
  body {
    font-size: 14px;
  }
}

/* Tablet */
@media (min-width: 601px) and (max-width: 1024px) {
  body {
    font-size: 16px;
  }
}

/* Computer */
@media (min-width: 1025px) {
  body {
    font-size: 18px;
  }
}
button {
  padding: 12px 20px;
  font-size: 1rem;
  min-height: 44px; /* Finger friendly */
}
img {
  max-width: 100%;
  height: auto;
}
nav {
  display: flex;
  flex-wrap: wrap;
}


</style>
</head>
<body>

<div class="container">
<h1>📚 Yapay Zekâ Kitap Önerileri</h1>
<p id="info" class="intro"></p>

<div class="ai-box">
<h2>🧠 AI Karar Açıklaması</h2>
<p>
Sistem; yaş grubu, okuma seviyesi ve seçilen kitap türünü
birlikte değerlendirerek öneri listesini oluşturmuştur.
</p>
</div>

<div class="book-grid" id="bookList"></div>
</div>

<button class="theme-btn" onclick="toggleDark()">
  🌙 
</button>

<script>
const age = localStorage.getItem("ageGroup");
const genre = localStorage.getItem("genre");

document.getElementById("info").innerText =
age + " yaş grubu için " + genre + " türünde önerilen kitaplar:";

/* 🔗 CONNECT data.js */
const ageKey = age; // example: "11-13"
const books = [];
function getRandomBooksByAge(category, ageKey, count = 4) {
  const allBooks = kitapVerisi[category];
  if (!allBooks) return [];

  // Filter by age
  const filtered = allBooks.filter(book => book.ozet[ageKey]);

  // Shuffle array
  const shuffled = filtered.sort(() => 0.5 - Math.random());

  // Return first "count" books
  return shuffled.slice(0, count);
}

/* Check genre exists */
if (kitapVerisi[genre]) {

  const selectedBooks = getRandomBooksByAge(genre, ageKey, 4);

  selectedBooks.forEach(item => {
    books.push({
      title: item.ad,
      img: item.kapak,
      link: item.link,
      author: item.yazar ? item.yazar : " ",
      summary: {
        short: item.ozet[ageKey] || "Bu yaş grubu için özet yok.",
        long: item.ozet[ageKey] || "Bu yaş grubu için detaylı özet bulunamadı."
      }
    });
  });

} else {
  document.getElementById("info").innerText =
    "Bu tür için kitap bulunamadı.";
}


const list = document.getElementById("bookList");

books.forEach((b,i)=>{
 const div=document.createElement("div");
 div.className="book-card";
 div.innerHTML=`
 <img src="${b.img}">
 <div class="book-title">${b.title}</div>
 <p>${b.summary.short}</p>
 <div class="book-detail" id="d${i}">
   <p><strong>Detaylı Özet:</strong> ${b.summary.long}</p>
   <div class="ai-note">
   🧠 AI bu kitabı, ${age} yaş grubunun okuma seviyesine ve ${genre} türüne uygun olduğu için önerdi.
   </div>
 </div>`;
div.onclick = () => {

  nTitle.innerText = b.title;
  nAuthor.innerText = b.author;
  nText.innerText = b.summary.long;
  nImg.src = b.img;

  const btn = document.getElementById("readBtn");

  btn.onclick = function(){
    window.open(b.link);
  };

  document.getElementById("notify").classList.add("show");
};


 list.appendChild(div);
 });

 function goHome(){
  window.location.href = "index.html";
}

function toggleDark(){
  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){
    localStorage.setItem("theme","dark");
  }else{
    localStorage.setItem("theme","light");
  }
}

/* Remember theme */
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
}
function closeNotify(){
  document.getElementById("notify").classList.remove("show");
}
element.addEventListener("click", () => {});


</script>

   <div style="text-align:center; margin:40px 0;">
  <button class="back-btn" onclick="goHome()">
    ⬅️ Geri/Ana sayfa
  </button>
</div>

<div id="notify" class="notify">
  <div class="notify-box">
    <span class="close" onclick="closeNotify()">✕</span>

    <div class="notify-header">
      <img id="nImg" src="">
      <div>
        <h3 id="nTitle"></h3>
        <p class="author">✍️ <span id="nAuthor"></span></p>
      </div>
    </div>

    <p id="nText" class="desc"></p>

    <div class="notify-footer">
      <span class="tag"> <strong>📚 Tavsiye edilen <br></strong>
                            "A.KOSAN-T.TORAN"</span>
<button class="read-btn" id="readBtn">Devamını oku</button>
    </div>
  </div>
</div>


</body>
</html>
