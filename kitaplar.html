<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<script src="data.js"></script>
<title>Kitap Önerileri</title>
<link rel="stylesheet" href="style.css">


<style>
/* Existing CSS here... */

/* The notification (popup) container */
.notify {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
  z-index: 999;
}

/* When the popup is visible */
.notify.show {
  opacity: 1;
  pointer-events: auto;
}

/* Smaller and more compact inner popup box styling */
.notify-box {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  max-width: 380px; /* Narrower width */
  width: 90%;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
  position: relative;
  animation: zoomIn 0.4s ease-out; /* Smooth zoom-in effect */
}

/* Header style for the popup */
.notify-header {
  display: flex;
  align-items: center;
  gap: 12px;
}

.notify-header img {
  width: 60px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
  box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
}

.notify-header h3 {
  font-size: 18px;
  margin: 0;
  font-weight: bold;
  color: #333;
}

/* Popup text (author, etc.) */
.author {
  font-size: 14px;
  opacity: 0.8;
}

/* Content text (description) */
.desc {
  font-size: 14px;
  margin-top: 12px;
  line-height: 1.6;
  color: #555;
}

/* Footer buttons and tag */
.notify-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 15px;
}

.read-btn {
  background: #3b82f6;
  border: none;
  padding: 8px 15px;
  border-radius: 25px;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  transition: 0.3s;
}

.read-btn:hover {
  background: #06b6d4;
  transform: scale(1.05);
}

.tag {
  font-size: 12px;
  color: #333;
  background: #f0f9ff;
  padding: 5px 12px;
  border-radius: 16px;
}

/* Add smooth zoom-in effect */
@keyframes zoomIn {
  from {
    transform: scale(0.9);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}
</style>

</head>
<body>

<div class="container">
<h1>📚 Yapay Zekâ Kitap Önerileri</h1>
<p id="info" class="intro"></p>

<div class="ai-box">
<h2>🧠 AI Karar Açıklaması</h2>
<p>
Sistem; yaş grubu, okuma seviyesi ve seçilen kitap türünü
birlikte değerlendirerek öneri listesini oluşturmuştur.
</p>
</div>

<div class="book-grid" id="bookList"></div>
</div>

<button class="theme-btn" onclick="toggleDark()">🌙</button>


  <script>
// Fetching age and genre from localStorage
const age = localStorage.getItem("ageGroup");
const genre = localStorage.getItem("genre");

document.getElementById("info").innerText = age + " yaş grubu için " + genre + " türünde önerilen kitaplar:";

/* 🔗 CONNECT data.js */

// Function to get books based on age group and genre
function getBooksForAgeAndGenre(category, ageKey, count = 10) {
  const allBooks = kitapVerisi[category]; // Get all books of selected genre
  if (!allBooks) return []; // If no books found, return empty array

  // Filter by age group (ensure that there are books with the correct summary for this age)
  const filtered = allBooks.filter(book => book.ozet[ageKey]);

  // If there are fewer than the requested number of books, return all available books
  if (filtered.length < count) {
    return filtered;
  }

  // Randomize the filtered books and return the first "count" books
  const shuffled = filtered.sort(() => 0.5 - Math.random());
  return shuffled.slice(0, count);
}

// Ensure that the genre exists in kitapVerisi
if (kitapVerisi[genre]) {

  // Get books for the selected genre and age group
  const selectedBooks = getBooksForAgeAndGenre(genre, age, 10); // Use the age as the key

  // If no books were found
  if (selectedBooks.length === 0) {
    document.getElementById("info").innerText = "Bu tür için kitap bulunamadı.";
  } else {
    // Create the books dynamically
    const list = document.getElementById("bookList");

    selectedBooks.forEach((item, i) => {
      const div = document.createElement("div");
      div.className = "book-card";
      div.innerHTML = `
        <img src="${item.kapak}">
        <div class="book-title">${item.ad}</div>
        <p>${item.ozet[age]}</p>
        <div class="book-detail" id="d${i}">
          <p><strong>Detaylı Özet:</strong> ${item.ozet[age]}</p>
          <div class="ai-note">
            🧠 AI bu kitabı, ${age} yaş grubunun okuma seviyesine ve ${genre} türüne uygun olduğu için önerdi.
          </div>
        </div>`;
      
// When a book is clicked
div.onclick = () => {
  const nTitle = document.getElementById("nTitle");
  const nAuthor = document.getElementById("nAuthor");
  const nText = document.getElementById("nText");
  const nImg = document.getElementById("nImg");
  const btn = document.getElementById("readBtn");

  // Update the popup with book details
  nTitle.innerText = item.ad;
  nAuthor.innerText = item.yazar ? item.yazar : "Bilinmeyen yazar";
  nText.innerText = item.ozet[age];  // Detailed summary
  nImg.src = item.kapak;

  // Handle the "Read More" button click
  btn.onclick = () => {
    if (item.link) window.open(item.link, "_blank");
  };

  // Show the popup
  document.getElementById("notify").classList.add("show");
};

      list.appendChild(div); // Append book card to the list
    });
  }
} else {
  document.getElementById("info").innerText = "Bu tür için kitap bulunamadı.";
}

// Dark mode toggle
function toggleDark() {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
  } else {
    localStorage.setItem("theme", "light");
  }
}

// Remember theme
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
}

function closeNotify() {
  document.getElementById("notify").classList.remove("show");
}

function goHome() {
  window.location.href = "index.html"; // Redirect to home page
}
</script>



<div style="text-align:center; margin:40px 0;">
  <button class="back-btn" onclick="goHome()">⬅️ Geri/Ana sayfa</button>
</div>

<div id="notify" class="notify">
  <div class="notify-box">
    <span class="close" onclick="closeNotify()">✕</span>
    <div class="notify-header">
      <img id="nImg" src="">
      <div>
        <h3 id="nTitle"></h3>
        <p class="author">✍️ <span id="nAuthor"></span></p>
      </div>
    </div>
    <p id="nText" class="desc"></p>
    <div class="notify-footer">
      <span class="tag">📚 Tavsiye edilen: "A.KOSAN-T.TORAN"</span>
      <button class="read-btn" id="readBtn">Devamını oku</button>
    </div>
  </div>
</div>

</body>
</html>
